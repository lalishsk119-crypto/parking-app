<!DOCTYPE html>
<html>
<head>
    <title>Parking App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .parking-container {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .slot {
            width: 100px;
            height: 100px;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🚗 Parking Slots</h1>
<h2 id="stats"></h2>

<div class="parking-container">
    <div class="slot" data-slot="A1">A1</div>
    <div class="slot" data-slot="A2">A2</div>
    <div class="slot" data-slot="A3">A3</div>
    <div class="slot" data-slot="B1">B1</div>
    <div class="slot" data-slot="B2">B2</div>
    <div class="slot" data-slot="B3">B3</div>
</div>

<script src="script.js"></script>

</body>
</html>
