<!DOCTYPE html>
<html>
<head>
<title>AI Smart Parking</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #000428, #004e92);
    color: white;
}

/* 🔥 NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

button {
    padding: 6px 12px;
    border: none;
    background: #ff4d4d;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

/* ⏰ CLOCK + AI */
.top-info {
    text-align: center;
    margin-top: 10px;
}

/* 📊 DASHBOARD */
.dashboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* 🚗 PARKING */
.parking {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(5, 120px);
    gap: 15px;
    justify-content: center;
}

.slot {
    height: 120px;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    white-space: pre-line;
    transition: 0.3s;
}

.slot:hover {
    transform: scale(1.08);
}

.available {
    background: linear-gradient(45deg, #00c853, #69f0ae);
}

.booked {
    background: linear-gradient(45deg, #d50000, #ff5252);
}

.suggested {
    border: 3px solid yellow;
    box-shadow: 0 0 15px yellow;
}

/* 📍 ROAD EFFECT */
body::before {
    content: "SMART PARKING";
    position: absolute;
    top: 50%;
    width: 100%;
    text-align: center;
    opacity: 0.05;
    font-size: 60px;
    z-index: -1;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
    .parking {
        grid-template-columns: repeat(2, 120px);
    }

    .dashboard {
        flex-direction: column;
        align-items: center;
    }
}

.footer {
    margin-top: 20px;
    text-align: center;
}
</style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<div class="navbar">
    <div>
        <button onclick="goHome()">Home</button>
        <button onclick="goHistory()">History</button>
        <button onclick="goProfile()">Profile</button>
        <button onclick="goDashboard()">Analytics</button>
    </div>

    <div>
        <span id="userDisplay"></span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<!-- ⏰ CLOCK + AI -->
<div class="top-info">
    <h3 id="clock"></h3>
    <h4 id="ai"></h4>
</div>

<!-- 📊 DASHBOARD -->
<div class="dashboard">
    <div class="card"><h3 id="total">0</h3><p>Total</p></div>
    <div class="card"><h3 id="available">0</h3><p>Available</p></div>
    <div class="card"><h3 id="booked">0</h3><p>Booked</p></div>
</div>

<!-- 🚗 PARKING -->
<div class="parking">
    <!-- 15 slots -->
    <div class="slot" data-slot="A1">A1</div>
    <div class="slot" data-slot="A2">A2</div>
    <div class="slot" data-slot="A3">A3</div>
    <div class="slot" data-slot="A4">A4</div>
    <div class="slot" data-slot="A5">A5</div>

    <div class="slot" data-slot="B1">B1</div>
    <div class="slot" data-slot="B2">B2</div>
    <div class="slot" data-slot="B3">B3</div>
    <div class="slot" data-slot="B4">B4</div>
    <div class="slot" data-slot="B5">B5</div>

    <div class="slot" data-slot="C1">C1</div>
    <div class="slot" data-slot="C2">C2</div>
    <div class="slot" data-slot="C3">C3</div>
    <div class="slot" data-slot="C4">C4</div>
    <div class="slot" data-slot="C5">C5</div>
</div>

<div class="footer">
    🚀 AI Smart Parking | Analytics | Smart Slots | Live System
</div>

<!-- 🔊 SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
// 🔐 USER
const user = localStorage.getItem("user");

if (!user) window.location.href = "/login.html";
else document.getElementById("userDisplay").innerText = "👤 " + user;

// 🔓 LOGOUT
function logout() {
    localStorage.removeItem("user");
    window.location.href = "/login.html";
}

// 🔀 NAV
function goHome(){ window.location.href="/"; }
function goHistory(){ window.location.href="/history.html"; }
function goProfile(){ window.location.href="/profile.html"; }
function goDashboard(){ window.location.href="/dashboard.html"; }

// 🤖 AI Prediction
function predictBusy() {
    const hour = new Date().getHours();

    if (hour >= 9 && hour <= 12) return "🔥 Peak Time";
    if (hour >= 17 && hour <= 20) return "🚗 Evening Rush";
    return "🟢 Low Traffic";
}

document.getElementById("ai").innerText = predictBusy();
</script>

<script src="script.js?v=FINAL_PRO"></script>

</body>
</html>
