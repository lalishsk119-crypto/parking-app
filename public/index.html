<!DOCTYPE html>
<html>
<head>
    <title>Smart Parking System</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        .top-bar {
            margin-top: 10px;
        }

        button {
            padding: 8px 15px;
            border: none;
            background: #ff4d4d;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .stats-box {
            margin: 20px;
            font-size: 18px;
        }

        .parking-container {
            display: grid;
            grid-template-columns: repeat(3, 140px);
            gap: 25px;
            justify-content: center;
            margin-top: 30px;
        }

        .slot {
            width: 140px;
            height: 140px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .available {
            background: #28a745;
        }

        .booked {
            background: #dc3545;
        }

        .slot:hover {
            transform: scale(1.1);
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<h1>🚗 Smart Parking System</h1>

<div class="top-bar">
    <span id="userDisplay"></span>
    <button onclick="logout()">Logout</button>
</div>

<div class="stats-box" id="stats">Loading...</div>

<div class="parking-container">
    <div class="slot" data-slot="A1">A1</div>
    <div class="slot" data-slot="A2">A2</div>
    <div class="slot" data-slot="A3">A3</div>
    <div class="slot" data-slot="B1">B1</div>
    <div class="slot" data-slot="B2">B2</div>
    <div class="slot" data-slot="B3">B3</div>
</div>

<div class="footer">
    ⚡ Auto Parking | Smart Booking | Real-time Slots
</div>

<script>
const user = localStorage.getItem("user");

if (!user) {
    window.location.href = "/login.html";
} else {
    document.getElementById("userDisplay").innerText = "👤 " + user;
}

function logout() {
    localStorage.removeItem("user");
    window.location.href = "/login.html";
}
</script>

<script src="script.js?v=99"></script>

</body>
</html>
