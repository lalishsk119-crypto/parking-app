<!DOCTYPE html>
<html>
<head>
    <title>Smart Parking</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
        }

        /* 🔥 NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(0,0,0,0.3);
        }

        .navbar h2 {
            margin: 0;
        }

        .logout {
            background: red;
            border: none;
            padding: 8px 15px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        /* 📊 DASHBOARD */
        .dashboard {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            width: 150px;
        }

        /* 🚗 PARKING GRID */
        .parking {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(3, 140px);
            gap: 25px;
            justify-content: center;
        }

        .slot {
            height: 140px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .slot:hover {
            transform: scale(1.1);
        }

        .available {
            background: linear-gradient(45deg, #00c853, #69f0ae);
        }

        .booked {
            background: linear-gradient(45deg, #d50000, #ff5252);
        }

        /* 💡 SUGGESTED */
        .suggested {
            border: 3px solid yellow;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
<div class="navbar">
    <button onclick="goHome()">Home</button>
    <button onclick="goHistory()">History</button>
    <button onclick="goProfile()">Profile</button>
</div>

<!-- 🔥 NAVBAR -->
<div class="navbar">
    <h2>🚗 Smart Parking</h2>
    <div>
        <span id="userDisplay"></span>
        <button class="logout" onclick="logout()">Logout</button>
    </div>
</div>

<!-- 📊 DASHBOARD -->
<div class="dashboard">
    <div class="card">
        <h3 id="total">0</h3>
        <p>Total</p>
    </div>
    <div class="card">
        <h3 id="available">0</h3>
        <p>Available</p>
    </div>
    <div class="card">
        <h3 id="booked">0</h3>
        <p>Booked</p>
    </div>
</div>

<!-- 🚗 PARKING -->
<div class="parking">

<!-- ROW A -->
<div class="slot" data-slot="A1">A1</div>
<div class="slot" data-slot="A2">A2</div>
<div class="slot" data-slot="A3">A3</div>
<div class="slot" data-slot="A4">A4</div>
<div class="slot" data-slot="A5">A5</div>

<!-- ROW B -->
<div class="slot" data-slot="B1">B1</div>
<div class="slot" data-slot="B2">B2</div>
<div class="slot" data-slot="B3">B3</div>
<div class="slot" data-slot="B4">B4</div>
<div class="slot" data-slot="B5">B5</div>

<!-- ROW C -->
<div class="slot" data-slot="C1">C1</div>
<div class="slot" data-slot="C2">C2</div>
<div class="slot" data-slot="C3">C3</div>
<div class="slot" data-slot="C4">C4</div>
<div class="slot" data-slot="C5">C5</div>

</div>

<div class="footer">
    ⚡ AI Smart Parking System
</div>

<script>
    const user = localStorage.getItem("user");

    if (!user) {
        window.location.href = "/login.html";
    } else {
        document.getElementById("userDisplay").innerText = "👤 " + user;
    }

    function logout() {
        localStorage.removeItem("user");
        window.location.href = "/login.html";
    }
    function goHome() {
    window.location.href = "/";
}

function goHistory() {
    window.location.href = "/history.html";
}

function goProfile() {
    window.location.href = "/profile.html";
}
</script>

<script src="script.js?v=FINAL"></script>

</body>
</html>
