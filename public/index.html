<!DOCTYPE html>

<html>
<head>
<title>🚗 AI Smart Parking Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #000428, #004e92);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.5);
}

button {
    padding: 8px 12px;
    border: none;
    background: #ff4d4d;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* SEARCH */
.search-box {
    text-align: center;
    margin-top: 15px;
}

.search-box input {
    padding: 10px;
    width: 250px;
    border-radius: 8px;
    border: none;
}

/* INFO */
.top-info {
    text-align: center;
    margin-top: 10px;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 12px;
    text-align: center;
}

/* ZONES */
.parking-zones {
    margin-top: 30px;
    padding: 20px;
}

.zone {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 12px;
}

.zone-slots {
    display: flex;
    gap: 15px;
}

.slot {
    height: 100px;
    width: 100px;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    cursor: pointer;
}

.available { background: green; }
.booked { background: red; }

/* MAP */
#map {
    height: 300px;
    width: 90%;
    margin: auto;
    border-radius: 10px;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
    <div>
        <button onclick="goHome()">Home</button>
        <button onclick="goHistory()">History</button>
        <button onclick="goProfile()">Profile</button>
    </div>

```
<div>
    <span id="userDisplay"></span>
    <button onclick="logout()">Logout</button>
</div>
```

</div>

<!-- SEARCH -->

<div class="search-box">
    <input id="search" placeholder="Search Slot (A1, B2...)">
</div>

<!-- INFO -->

<div class="top-info">
    <h3 id="clock"></h3>
    <h4 id="ai"></h4>
    <button onclick="navigateToParking()">📍 Navigate to Parking</button>
</div>

<!-- DASHBOARD -->

<div class="dashboard">
    <div class="card"><h3 id="total">0</h3><p>Total</p></div>
    <div class="card"><h3 id="available">0</h3><p>Available</p></div>
    <div class="card"><h3 id="booked">0</h3><p>Booked</p></div>
</div>

<!-- ZONES -->

<div class="parking-zones">

```
<div class="zone">
    <h2>🅿️ Zone A (Main Gate)</h2>
    <div class="zone-slots">
        <div class="slot" data-slot="A1">A1</div>
        <div class="slot" data-slot="A2">A2</div>
        <div class="slot" data-slot="A3">A3</div>
    </div>
</div>

<div class="zone">
    <h2>🏍️ Zone B (Bike Parking)</h2>
    <div class="zone-slots">
        <div class="slot" data-slot="B1">B1</div>
        <div class="slot" data-slot="B2">B2</div>
        <div class="slot" data-slot="B3">B3</div>
    </div>
</div>

<div class="zone">
    <h2>🚗 Zone C (Car Parking)</h2>
    <div class="zone-slots">
        <div class="slot" data-slot="C1">C1</div>
        <div class="slot" data-slot="C2">C2</div>
        <div class="slot" data-slot="C3">C3</div>
    </div>
</div>
```

</div>

<!-- LIVE MAP -->

<div id="map"></div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- GOOGLE MAP API -->

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>

<script>
// USER
const user = localStorage.getItem("user");
if (!user) window.location.href = "/login.html";
else document.getElementById("userDisplay").innerText = "👤 " + user;

// NAV
function goHome(){ window.location.href="/"; }
function goHistory(){ window.location.href="/history.html"; }
function goProfile(){ window.location.href="/profile.html"; }

// LOGOUT
function logout() {
    localStorage.removeItem("user");
    window.location.href = "/login.html";
}

// CLOCK
setInterval(() => {
    document.getElementById("clock").innerText = new Date().toLocaleTimeString();
}, 1000);

// SEARCH
document.getElementById("search").addEventListener("input", function() {
    const val = this.value.toUpperCase();
    document.querySelectorAll(".slot").forEach(s => {
        s.style.display = s.innerText.includes(val) ? "flex" : "none";
    });
});

// NAVIGATION (GOOGLE MAP ROUTE)
function navigateToParking() {
    navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        const url = `https://www.google.com/maps/dir/${lat},${lng}/11.0247,77.0025`;
        window.open(url, '_blank');
    });
}

// LIVE MAP TRACKING
let map;
let marker;

function initMap(lat, lng) {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat, lng },
        zoom: 16
    });

    marker = new google.maps.Marker({
        position: { lat, lng },
        map: map
    });
}

navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    if (!map) {
        initMap(lat, lng);
    } else {
        marker.setPosition({ lat, lng });
        map.setCenter({ lat, lng });
    }

    document.getElementById("ai").innerText =
        "📍 Live Location Active → Suggested Zone A";
});
</script>

<script src="script.js"></script>

</body>
</html>
