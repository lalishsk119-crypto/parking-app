<!DOCTYPE html>

<html>
<head>
<title>🚗 AI Smart Parking Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
<style>

/* 🌌 GLOBAL */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: white;
}

/* 🔥 NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: #111827;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

button {
    background: #ff3b3b;
    border: none;
    padding: 8px 14px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* 🔍 SEARCH */
.search-box {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.search-box input {
    width: 320px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #1e293b;
    color: white;
}

/* ⏰ TOP INFO */
.top-info {
    text-align: center;
    margin-top: 20px;
}

/* 📊 DASHBOARD CARDS */
.dashboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 120px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* 🚗 ZONES */
.parking-zones {
    max-width: 900px;
    margin: 40px auto;
}

.zone {
    background: #1e293b;
    padding: 20px;
    margin-bottom: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.zone h2 {
    margin-bottom: 15px;
}

/* 🧱 SLOT GRID */
.zone-slots {
    display: flex;
    gap: 15px;
}

/* 🟢🔴 SLOT STYLE */
.slot {
    height: 100px;
    width: 100px;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.slot:hover {
    transform: translateY(-5px);
}

/* COLORS */
.available {
    background: linear-gradient(135deg, #16a34a, #22c55e);
}

.booked {
    background: linear-gradient(135deg, #dc2626, #ef4444);
}

/* 💡 SUGGESTED */
.suggested {
    border: 3px solid yellow;
    box-shadow: 0 0 20px yellow;
}

/* 🗺 MAP */
#map {
    height: 300px;
    width: 90%;
    margin: 40px auto;
    border-radius: 15px;
    overflow: hidden;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
    .dashboard {
        flex-direction: column;
        align-items: center;
    }

    .zone-slots {
        flex-wrap: wrap;
        justify-content: center;
    }
}

</style>


</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
    <div>
        <button onclick="goHome()">Home</button>
        <button onclick="goHistory()">History</button>
        <button onclick="goProfile()">Profile</button>
    </div>

```
<div>
    <span id="userDisplay"></span>
    <button onclick="logout()">Logout</button>
</div>
```

</div>

<!-- SEARCH -->

<div class="search-box">
    <input id="search" placeholder="Search Slot (A1, B2...)">
</div>

<!-- INFO -->

<div class="top-info">
    <h3 id="clock"></h3>
    <h4 id="ai"></h4>
    <button onclick="navigateToParking()">📍 Navigate to Parking</button>
</div>

<!-- DASHBOARD -->

<div class="dashboard">
    <div class="card"><h3 id="total">0</h3><p>Total</p></div>
    <div class="card"><h3 id="available">0</h3><p>Available</p></div>
    <div class="card"><h3 id="booked">0</h3><p>Booked</p></div>
</div>

<!-- ZONES -->

<div class="parking-zones">
<h1 style="text-align:center;">🚗 Smart Parking Dashboard</h1>

```
<div class="zone">
    <h2>🅿️ Zone A (Main Gate)</h2>
    <div class="zone-slots">
        <div class="slot" data-slot="A1">A1</div>
        <div class="slot" data-slot="A2">A2</div>
        <div class="slot" data-slot="A3">A3</div>
    </div>
</div>

<div class="zone">

    <div class="zone-slots">
        <div class="slot" data-slot="B1">B1</div>
        <div class="slot" data-slot="B2">B2</div>
        <div class="slot" data-slot="B3">B3</div>
    </div>
</div>

<div class="zone">
    <h2>🚗 Zone C (Car Parking)</h2>
    <div class="zone-slots">
        <div class="slot" data-slot="C1">C1</div>
        <div class="slot" data-slot="C2">C2</div>
        <div class="slot" data-slot="C3">C3</div>
    </div>
</div>
```

</div>

<!-- LIVE MAP -->

<div id="map"></div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- GOOGLE MAP API -->

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>

<script>
// USER
const user = localStorage.getItem("user");
if (!user) window.location.href = "/login.html";
else document.getElementById("userDisplay").innerText = "👤 " + user;

// NAV
function goHome(){ window.location.href="/"; }
function goHistory(){ window.location.href="/history.html"; }
function goProfile(){ window.location.href="/profile.html"; }

// LOGOUT
function logout() {
    localStorage.removeItem("user");
    window.location.href = "/login.html";
}

// CLOCK
setInterval(() => {
    document.getElementById("clock").innerText = new Date().toLocaleTimeString();
}, 1000);

// SEARCH
document.getElementById("search").addEventListener("input", function() {
    const val = this.value.toUpperCase();
    document.querySelectorAll(".slot").forEach(s => {
        s.style.display = s.innerText.includes(val) ? "flex" : "none";
    });
});

// NAVIGATION (GOOGLE MAP ROUTE)
function navigateToParking() {
    navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        const url = `https://www.google.com/maps/dir/${lat},${lng}/11.0247,77.0025`;
        window.open(url, '_blank');
    });
}

// LIVE MAP TRACKING
let map;
let marker;

function initMap(lat, lng) {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat, lng },
        zoom: 16
    });

    marker = new google.maps.Marker({
        position: { lat, lng },
        map: map
    });
}

navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    if (!map) {
        initMap(lat, lng);
    } else {
        marker.setPosition({ lat, lng });
        map.setCenter({ lat, lng });
    }

    document.getElementById("ai").innerText =
        "📍 Live Location Active → Suggested Zone A";
});
</script>

<script src="script.js"></script>

</body>
</html>
