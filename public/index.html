<!DOCTYPE html>
<html>
<head>
<title>AI Smart Parking</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #000428, #004e92);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.4);
}

button {
    padding: 6px 12px;
    border: none;
    background: #ff4d4d;
    color: white;
    border-radius: 5px;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
}

/* PARKING */
.parking {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(5, 120px);
    gap: 15px;
    justify-content: center;
}

.slot {
    height: 120px;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    white-space: pre-line;
}

.available { background: green; }
.booked { background: red; }
.suggested { border: 3px solid yellow; }

.footer {
    margin-top: 20px;
    text-align: center;
}
</style>
</head>

<body>

<div class="navbar">
    <div>
        <button onclick="goHome()">Home</button>
        <button onclick="goHistory()">History</button>
        <button onclick="goProfile()">Profile</button>
    </div>

    <div>
        <span id="userDisplay"></span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<h3 id="clock"></h3>

<div class="dashboard">
    <div class="card"><h3 id="total">0</h3><p>Total</p></div>
    <div class="card"><h3 id="available">0</h3><p>Available</p></div>
    <div class="card"><h3 id="booked">0</h3><p>Booked</p></div>
</div>

<div class="parking">
    <!-- 15 slots -->
    <div class="slot" data-slot="A1">A1</div>
    <div class="slot" data-slot="A2">A2</div>
    <div class="slot" data-slot="A3">A3</div>
    <div class="slot" data-slot="A4">A4</div>
    <div class="slot" data-slot="A5">A5</div>

    <div class="slot" data-slot="B1">B1</div>
    <div class="slot" data-slot="B2">B2</div>
    <div class="slot" data-slot="B3">B3</div>
    <div class="slot" data-slot="B4">B4</div>
    <div class="slot" data-slot="B5">B5</div>

    <div class="slot" data-slot="C1">C1</div>
    <div class="slot" data-slot="C2">C2</div>
    <div class="slot" data-slot="C3">C3</div>
    <div class="slot" data-slot="C4">C4</div>
    <div class="slot" data-slot="C5">C5</div>
</div>

<div class="footer">
    🚀 AI Smart Parking | Lucky Slots | Dynamic System
</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const user = localStorage.getItem("user");

if (!user) window.location.href = "/login.html";
else document.getElementById("userDisplay").innerText = "👤 " + user;

function logout() {
    localStorage.removeItem("user");
    window.location.href = "/login.html";
}

function goHome(){ window.location.href="/"; }
function goHistory(){ window.location.href="/history.html"; }
function goProfile(){ window.location.href="/profile.html"; }
</script>

<script src="script.js?v=ULTIMATE"></script>

</body>
</html>
