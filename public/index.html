<!DOCTYPE html>
<html>
<head>
    <title>Parking App</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: #f4f6f9;
        }

        h1 {
            margin-top: 20px;
            color: #333;
        }

        .top-bar {
            margin-top: 10px;
        }

        button {
            padding: 8px 15px;
            border: none;
            background: #ff4d4d;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e60000;
        }

        .parking-container {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 25px;
            justify-content: center;
            margin-top: 40px;
        }

        .slot {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        /* 🟢 Available */
        .slot.available {
            background: #28a745;
        }

        /* 🔴 Booked */
        .slot.booked {
            background: #dc3545;
        }

        .slot:hover {
            transform: scale(1.08);
        }
    </style>
</head>

<body>

<h1>🚗 Parking Slots</h1>

<!-- 🔐 USER + LOGOUT -->
<div class="top-bar">
    <span id="userDisplay"></span>
    <button onclick="logout()">Logout</button>
</div>

<h2 id="stats">Loading...</h2>

<div class="parking-container">
    <div class="slot" data-slot="A1">A1</div>
    <div class="slot" data-slot="A2">A2</div>
    <div class="slot" data-slot="A3">A3</div>
    <div class="slot" data-slot="B1">B1</div>
    <div class="slot" data-slot="B2">B2</div>
    <div class="slot" data-slot="B3">B3</div>
</div>

<script>
    // 🔐 Show logged-in user
    const user = localStorage.getItem("user");

    if (!user) {
        window.location.href = "/login.html";
    } else {
        document.getElementById("userDisplay").innerText = "👤 " + user;
    }

    // 🔐 Logout function
    function logout() {
        localStorage.removeItem("user");
        window.location.href = "/login.html";
    }
</script>

<!-- ✅ Load main script -->
<script src="script.js?v=4"></script>

</body>
</html>
