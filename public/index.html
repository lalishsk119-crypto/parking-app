<!DOCTYPE html>

<html>
<head>
<title>🚗 AI Smart Parking Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #000428, #004e92);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
}

button {
    padding: 8px 12px;
    border: none;
    background: #ff4d4d;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* SEARCH */
.search-box {
    text-align: center;
    margin-top: 15px;
}

.search-box input {
    padding: 10px;
    width: 250px;
    border-radius: 8px;
    border: none;
}

/* INFO */
.top-info {
    text-align: center;
    margin-top: 10px;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 12px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    text-align: center;
}

/* PARKING GRID */
.parking {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(5, 120px);
    gap: 15px;
    justify-content: center;
}

.slot {
    height: 120px;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    white-space: pre-line;
    transition: 0.3s;
}

.slot:hover {
    transform: scale(1.1);
}

.available {
    background: linear-gradient(45deg, #00c853, #69f0ae);
}

.booked {
    background: linear-gradient(45deg, #d50000, #ff5252);
}

.suggested {
    border: 3px solid yellow;
    box-shadow: 0 0 15px yellow;
}

/* MOBILE */
@media (max-width: 600px) {
    .parking {
        grid-template-columns: repeat(2, 120px);
    }

    .dashboard {
        flex-direction: column;
        align-items: center;
    }
}

.footer {
    margin-top: 20px;
    text-align: center;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
    <div>
        <button onclick="goHome()">Home</button>
        <button onclick="goHistory()">History</button>
        <button onclick="goProfile()">Profile</button>
    </div>

```
<div>
    <span id="userDisplay"></span>
    <button onclick="logout()">Logout</button>
</div>
```

</div>

<!-- SEARCH -->

<div class="search-box">
    <input id="search" placeholder="Search Slot (A1, B2...)">
</div>

<!-- INFO -->

<div class="top-info">
    <h3 id="clock"></h3>
    <h4 id="ai"></h4>
</div>

<!-- DASHBOARD -->

<div class="dashboard">
    <div class="card"><h3 id="total">0</h3><p>Total</p></div>
    <div class="card"><h3 id="available">0</h3><p>Available</p></div>
    <div class="card"><h3 id="booked">0</h3><p>Booked</p></div>
</div>

<!-- PARKING -->

<div class="parking">
    <div class="slot" data-slot="A1">A1</div>
    <div class="slot" data-slot="A2">A2</div>
    <div class="slot" data-slot="A3">A3</div>
    <div class="slot" data-slot="A4">A4</div>
    <div class="slot" data-slot="A5">A5</div>

```
<div class="slot" data-slot="B1">B1</div>
<div class="slot" data-slot="B2">B2</div>
<div class="slot" data-slot="B3">B3</div>
<div class="slot" data-slot="B4">B4</div>
<div class="slot" data-slot="B5">B5</div>

<div class="slot" data-slot="C1">C1</div>
<div class="slot" data-slot="C2">C2</div>
<div class="slot" data-slot="C3">C3</div>
<div class="slot" data-slot="C4">C4</div>
<div class="slot" data-slot="C5">C5</div>
```

</div>

<div class="footer">
    🚀 AI Smart Parking Pro | Live System
</div>

<!-- SOUND -->

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
// USER
const user = localStorage.getItem("user");
if (!user) window.location.href = "/login.html";
else document.getElementById("userDisplay").innerText = "👤 " + user;

// LOGOUT
function logout() {
    localStorage.removeItem("user");
    window.location.href = "/login.html";
}

// NAV
function goHome(){ window.location.href="/"; }
function goHistory(){ window.location.href="/history.html"; }
function goProfile(){ window.location.href="/profile.html"; }

// CLOCK
setInterval(() => {
    document.getElementById("clock").innerText =
        "⏰ " + new Date().toLocaleTimeString();
}, 1000);

// AI
function predictBusy() {
    const hour = new Date().getHours();
    if (hour >= 9 && hour <= 12) return "🔥 Peak Time";
    if (hour >= 17 && hour <= 20) return "🚗 Evening Rush";
    return "🟢 Low Traffic";
}
document.getElementById("ai").innerText = predictBusy();

// SEARCH
document.getElementById("search").addEventListener("input", function() {
    const value = this.value.toUpperCase();
    document.querySelectorAll(".slot").forEach(slot => {
        slot.style.display = slot.innerText.includes(value) ? "flex" : "none";
    });
});

// SOUND
function playSound() {
    document.getElementById("clickSound").play();
}
</script>

<script src="script.js?v=FINAL_PRO_MAX"></script>

</body>
</html>
